<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in</title>
    <link rel="stylesheet" href="css/nadastyle.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/nadatheme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button id="theme-toggle" class="theme-btn">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>
    <div class="auth-container">
        <form id="login-form" class="auth-form" method="post">
            <h2>log in</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="main-btn">log in</button>
            <p class="switch-text">Don't have an account? <a href="signup.html">Sign up here</a></p>
        </form>
    </div>
   
    <script src="js/script-theme.js"></script>
    <script src="js/login.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
