<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Account</title>  
    <link rel="stylesheet" href="css/nadastyle.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/nadatheme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <button id="theme-toggle" class="theme-btn">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>
    <div class="auth-container">
        <form id="signup-form" class="auth-form" method="post">
            <h2>sign up</h2>
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="signup-name" required placeholder="Enter your name">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signup-email" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signup-password" required placeholder="Create a password">
            </div>
            <button type="submit" class="main-btn">Create Account</button>
            <p class="switch-text">already have an account? <a href="login.html">login here</a></p>
        </form>
        </form>
    </div>
    <script src="js/script-theme.js"></script> 
    <script src="js/signup.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
